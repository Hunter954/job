{% extends "base.html" %}
{% block content %}
<div class="container" style="max-width: 960px; padding: 30px 15px;">
  <h2 style="font-size: 24px; font-weight: 900; margin-bottom: 16px;">Meus pagamentos</h2>

  <div style="border:1px solid #e5e7eb; border-radius:16px; overflow:hidden; background:#fff;">
    <table style="width:100%; border-collapse:collapse;">
      <thead>
        <tr style="background:#f9fafb; text-align:left;">
          <th style="padding:12px;">#</th>
          <th style="padding:12px;">Valor</th>
          <th style="padding:12px;">Status</th>
          <th style="padding:12px;">Criado</th>
          <th style="padding:12px;"></th>
        </tr>
      </thead>
      <tbody>
        {% for p in payments %}
        <tr style="border-top:1px solid #f3f4f6;">
          <td style="padding:12px;">{{ p.id }}</td>
          <td style="padding:12px;">R$ {{ '%.2f' % (p.amount_cents/100) }}</td>
          <td style="padding:12px;"><strong>{{ p.status }}</strong></td>
          <td style="padding:12px;">{{ p.created_at.strftime('%d/%m/%Y %H:%M') if p.created_at else '' }}</td>
          <td style="padding:12px;">
            <a class="btn btn-sm btn-outline" href="{{ url_for('payments.checkout', payment_id=p.id) }}">Abrir</a>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
